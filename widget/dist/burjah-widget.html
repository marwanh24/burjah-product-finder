  background: var(--white);
  border-radius: 18px;
  padding: 28px;
  border: 1px solid var(--border);
}
.bw-hero-content { flex: 1 1 320px; min-width: 260px; }
.bw-hero-media { flex: 1 1 240px; min-width: 200px; text-align: center; }
.bw-hero-media img { max-width: 100%; border-radius: 16px; }
.bw-eyebrow { color: var(--orange); font-weight: 700; font-size: 0.95rem; margin: 0 0 8px; }
.bw-title { color: var(--navy); font-size: 1.8rem; font-weight: 800; margin: 0 0 10px; }
.bw-subtitle { color: var(--gray); font-size: 1rem; margin: 0 0 20px; }
.bw-cta {
  background: var(--navy);
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 14px 28px;

  font-weight: 700;

}

.bw-trust-row {
  display: flex;
  gap: 14px;
  margin-top: 22px;
  flex-wrap: wrap;
}
.bw-trust-item {
  flex: 1 1 140px;
  background: var(--beige);
  border-radius: 12px;
  padding: 12px;
  font-size: 0.85rem;
  text-align: center;
  color: var(--navy-dark);
}

.bw-how {
  margin-top: 24px;
  border-top: 1px dashed var(--border);
  padding-top: 18px;
}
.bw-how h3 { color: var(--navy); font-size: 1rem; margin: 0 0 12px; }
.bw-how-step { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.9rem; }
.bw-how-num {
  flex: none;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--navy);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.85rem;
}

/* ---------- الشاشات 2-6: الأسئلة ---------- */
.bw-question-screen {
  background: var(--white);
  border-radius: 18px;
  padding: 24px;
  border: 1px solid var(--border);
}
.bw-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.bw-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.bw-dot.is-active { background: var(--orange); }
.bw-dot.is-done { background: var(--navy); }
.bw-progress-label { font-size: 0.8rem; color: var(--gray); margin-inline-start: 6px; }
.bw-question-title { color: var(--navy); font-size: 1.3rem; font-weight: 800; margin: 14px 0 18px; }

.bw-options {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}
.bw-option {
  background: var(--beige);
  border: 2px solid transparent;
  border-radius: 14px;
  padding: 16px 10px;
  text-align: center;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--navy-dark);
  position: relative;
  transition: border-color .15s ease;
}
.bw-option:hover { border-color: var(--border); }
.bw-option.is-selected { border-color: var(--orange); background: var(--beige-2); }
.bw-option.is-selected::after {
  content: "✓";
  position: absolute;
  top: 6px; inset-inline-end: 8px;
  color: var(--orange);
  font-weight: 900;
}
.bw-option-icon {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: var(--beige-2);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 8px;
  font-size: 1.3rem;
}
.bw-option.is-selected .bw-option-icon { background: #ffe6c2; }

.bw-color-grid { display: flex; flex-wrap: wrap; gap: 12px; }
.bw-color-chip {

}
.bw-color-swatch {

  border: 3px solid transparent;
}
.bw-color-chip.is-selected .bw-color-swatch { border-color: var(--orange); }

.bw-nav-row { display: flex; justify-content: space-between; margin-top: 24px; gap: 10px; }
.bw-btn-secondary {
  background: var(--beige-2);

  border-radius: 999px;
  padding: 12px 22px;
  font-weight: 700;
}
.bw-btn-primary {
  background: var(--orange);

  border-radius: 999px;

}

  border-radius: 12px;

  font-size: 1.1rem;

}

.bw-results-title { color: var(--navy); font-size: 1.4rem; font-weight: 800; text-align: center; margin: 6px 0 20px; }

      "ثوب"
    ],
    "مدرسة": [
      "ثوب"
    ],
    "يومي": [
      "ثوب"
    ],
    "بدون": [
      "ثوب"
    ]
  },
  "accessoriesMawalidOrder": [
    "ميني سكارف",
    "شرقي",
    "صندل جلد H",
    "صندل جلد"
  ],
  "accessories1to12Priority": {
    "5-12": [
      "الساعات",
      "السبح الفاخرة",

    ],
    "1-4": [

<script>
'use strict';
/**
 * محرك القرار — شجرة ثابتة بالكامل (لا ذكاء اصطناعي)، ينفّذ تسلسل logic_prompt.md §21:
 * collectAnswers -> filterHardConstraints -> selectFamilies -> checkLiveAvailability
 * -> applyBudget -> rankResults -> buildCards.
 * يعمل داخل Node (اختبارات) وداخل المتصفح (مضمّن inline في الويدجت) بلا فروقات.
 */
(function (root, factory) {
  const mod = factory();
  if (typeof module !== 'undefined' && module.exports) module.exports = mod;
  else root.DecisionEngine = mod;
})(typeof self !== 'undefined' ? self : this, function () {
  // ============================================================
  // ثوابت مشتقة من logic_prompt.md §4-§7
  // ============================================================

  // §5.1 نطاق مقاس الثوب التقريبي حسب العمر (متداخل عمداً)
  const THOB_SIZE_RANGE_BY_AGE = {
    '1-3': [26, 32],
    '4-6': [33, 40],
    '7-9': [38, 46],
    '10-12': [46, 52],
  };

  // §5.2 ربط مقاس السديري بنطاق مقاس الثوب المقابل
  const VEST_TO_THOB_RANGE = [
    { vestSize: 10, thobRange: [22, 24] },
    { vestSize: 12, thobRange: [25, 28] },
    { vestSize: 14, thobRange: [29, 32] },
    { vestSize: 16, thobRange: [33, 36] },
    { vestSize: 18, thobRange: [37, 41] },
    { vestSize: 20, thobRange: [42, 45] },
    { vestSize: 22, thobRange: [46, 52] },
  ];

  // خيارات مبسّطة لسؤال المناسبة في الويدجت (build_spec.md §5.4) -> مجموعة مناسبات كنسية (logic_prompt.md §4)
  const OCCASION_UI_MAP = {
    'زواج': ['زواج'],
    'تصوير': ['تصوير'],
    'عيد': ['عيد'],
    'عيد_زيارة': ['عيد', 'زيارة'],
    'زيارة': ['زيارة'],
    'مدرسة_يومي': ['مدرسة', 'يومي'],
    'مدرسة': ['مدرسة'],
    'يومي': ['يومي'],
    'بدون': ['بدون'],
    'هدية': ['هدية'],
  };

  // خيارات مبسّطة لسؤال الستايل/المسار (build_spec.md §5.4) -> مسار + تفضيل أسلوب/فخامة (قابل للتجاوز فقط)
  const TRACK_UI_MAP = {
    'ثوب_سادة': { track: 'ثوب', styleHint: 'هادئ وبسيط' },
    'ثوب_مطرز': { track: 'ثوب', styleHint: 'تطريز واضح مميز' },
    'طقم': { track: 'طقم' },
    'إطلالة_فخمة': { track: 'ثوب', luxuryHint: 'فاخر ومميز' },
    'اختر_لي': { track: 'اختر لي' },
    // مسارات إضافية يدعمها المحرك (غير مربوطة بزر مباشر في الويدجت الحالي، تُستخدم من "اختر لي" أو اختبارات)
    'سديري_مستقل': { track: 'سديري مستقل' },
    'دقلة': { track: 'دقلة' },
  };

  const COLORTYPE_WHITE_FAMILY = new Set(['أبيض', 'أوف وايت']);

  function normalizeOccasionSet(occasionChoice) {
    return new Set(OCCASION_UI_MAP[occasionChoice] || [occasionChoice]);
  }

  function resolveTrack(answers) {
    if (answers._resolvedTrack) return answers._resolvedTrack; // تجاوز داخلي لتشغيل مسار محدد أثناء "اختر لي"
    if (answers.age === 'مواليد') return 'إطلالة مواليد'; // §13.1 العمر يفرض المسار بلا نقاش
    const mapped = TRACK_UI_MAP[answers.styleChoice];
    return mapped ? mapped.track : answers.styleChoice;
  }

  // ============================================================
  // 1) collectAnswers — تحقق الحد الأدنى (العمر/المناسبة/المسار/الميزانية إلزامية قبل التوصية، §2/§6)
  // ============================================================
  function collectAnswers(rawAnswers) {
    const missing = [];
    if (!rawAnswers.age) missing.push('age');
    if (!rawAnswers.occasionChoice) missing.push('occasionChoice');
    if (!rawAnswers.styleChoice) missing.push('styleChoice');
    if (rawAnswers.budget === undefined || rawAnswers.budget === null) missing.push('budget');
    return { complete: missing.length === 0, missing, answers: rawAnswers };
  }

  // ============================================================
  // 2) filterHardConstraints — القسم 7.1: عمر/مناسبة/مسار/لون/نوع لون/موسم/مقاس/بيع/ظهور/مخزون
  //    (البيع/الظهور/المخزون تُفحص لاحقاً في checkLiveAvailability بعد جلب live.json)
  // ============================================================
  function filterHardConstraints(catalogEntries, answers) {
    const track = resolveTrack(answers);
    const occasionSet = normalizeOccasionSet(answers.occasionChoice);
    const requestedColors = (answers.colors || []).filter((c) => c && c !== 'بدون تفضيل');

    return catalogEntries.filter((p) => {
      if (p.excludeFromStandalone && track !== 'طقم') return false;

      // القسم 19: لا سديري بُرجة للزيارات — مطبّق أصلاً عبر occasions الثابتة في products.json.
      // القسم 10.1: السديري المستقل يفترض أن العميل يملك ثوباً مناسباً مسبقاً — لا نفترض ذلك أبداً؛
      // يُفعَّل فقط إن أكّد المستخدم صراحة (answers.hasThobForVest === true).
      if (track === 'سديري مستقل' && !answers.hasThobForVest) return false;

      // للطقم: البطاقة تمثّل الإطلالة الكاملة، فلا نعرض سديري المكوّن كنتيجة مستقلة —
      // فقط الثوب (يُجمع مع أرخص سديري متوافق في applyBudget) أو الطقم أحادي القطعة.
      const trackMatches =
        (track === 'ثوب' && p.track && p.track.includes('ثوب')) ||
        (track === 'طقم' && p.taqmFamily && (p.taqmRole === 'ثوب' || p.taqmRole === 'طقم كامل')) ||
        (track === 'سديري مستقل' && p.track && p.track.includes('سديري مستقل')) ||
        (track === 'دقلة' && p.track && p.track.includes('دقلة')) ||
        (track === 'إطلالة مواليد' && p.track && p.track.includes('إطلالة مواليد'));
      if (!trackMatches) return false;

      // المناسبة (صلبة) — للطقم نستخدم occasions_taqm الخاصة بسياق الطقم
      const productOccasions =
        track === 'طقم' ? p.occasions_taqm || p.occasions : p.occasions;
      if (productOccasions) {
        const overlap = productOccasions.some((o) => occasionSet.has(o));
        if (!overlap) return false;
      }

      // نوع اللون (صلب) — مقارنة تقريبية بالخريطة الثابتة؛ التأكيد الدقيق لاحقاً من live.json
      if (requestedColors.length) {
        const colorTypeForCheck =
          track === 'طقم' && p.taqmColorType ? p.taqmColorType : p.colorType;
        if (colorTypeForCheck && colorTypeForCheck.length) {
            const wantsWhiteFamily = requestedColors.some((c) => COLORTYPE_WHITE_FAMILY.has(c));
            const wantsColored = requestedColors.some((c) => !COLORTYPE_WHITE_FAMILY.has(c));
            const hasWhiteFamily = colorTypeForCheck.some((c) => COLORTYPE_WHITE_FAMILY.has(c));
            const hasColored = colorTypeForCheck.includes('ملوّن');
            const passes = (wantsWhiteFamily && hasWhiteFamily) || (wantsColored && hasColored);
            if (!passes) return false;
        } else if (p.colorCompat && p.colorCompat !== 'varies') {
          // سديري/دقلة: colorCompat = أبيض|أوف وايت|الاثنين
          const wantsWhiteFamily = requestedColors.some((c) => COLORTYPE_WHITE_FAMILY.has(c));
          if (wantsWhiteFamily && p.colorCompat !== 'الاثنين' && !requestedColors.includes(p.colorCompat)) {
            return false;
          }
        }
      }

      // العمر (صلب لغير الثوب/الطقم — عبر ageGroup الصريح إن وُجد؛ مقاس الثوب يُفحص عبر availableSizes لاحقاً)
      if (p.ageGroup) {
        if (p.ageGroup === 'مواليد' && answers.age !== 'مواليد') return false;
        if (p.ageGroup !== 'مواليد' && answers.age === 'مواليد') return false;
        if (p.ageGroup.includes('-') && answers.ageYears !== undefined) {
          const [min, max] = p.ageGroup.split('-').map(Number);
          if (answers.ageYears < min || answers.ageYears > max) return false;
        }
      } else if (answers.age === 'مواليد' && track !== 'إطلالة مواليد') {
        return false; // مواليد لا يدخل مساراً غير مسار المواليد إلا عبر ageGroup الصريح
      }

      return true;
    });
  }

  // ============================================================
  // 3) selectFamilies — ترتيب العائلات حسب جداول rankings.json بحسب المناسبة+المسار
  // ============================================================
  function familyRankKey(product, track) {
    if (track === 'طقم') return product.taqmFamily;
    return product.family;
  }

  function selectFamilies(candidates, answers, rankings) {
    const track = resolveTrack(answers);
    const occasionSet = normalizeOccasionSet(answers.occasionChoice);
    const primaryOccasion = Array.from(occasionSet)[0];

    let orderTable = null;
    if (track === 'ثوب') orderTable = rankings.thob;
    else if (track === 'طقم') orderTable = rankings.taqm;
    else if (track === 'سديري مستقل') orderTable = rankings.sideriMostaqel;
    else if (track === 'دقلة') orderTable = rankings.daglah;
    else if (track === 'إطلالة مواليد') orderTable = rankings.berbetoz;

    const order = orderTable ? orderTable[primaryOccasion] || [] : [];
    return candidates.map((p) => ({
      ...p,
      _familyRank: order.indexOf(familyRankKey(p, track)),
    }));
  }

  // ============================================================
  // 4) checkLiveAvailability — القسم 3 و21.5-6: توفر فعلي + مقاس ضمن النطاق + لون مطلوب
  // ============================================================
  function checkLiveAvailability(candidates, live, answers) {
    const requestedColors = (answers.colors || []).filter((c) => c && c !== 'بدون تفضيل');
    const sizeRange = THOB_SIZE_RANGE_BY_AGE[answers.age] || null;
    // تعذّر تحميل live.json بالكامل (فشل الشبكة) — حالة مختلفة عن غياب سجل منتج واحد
    // (الأخير لا يُفترض حدوثه في الإنتاج لأن sync.js يكتب سجلاً لكل ID، حتى عند الفشل).
    const liveUnavailableEntirely = !live || !live.products;

    return candidates
      .map((p) => {
        const liveRecord = live && live.products ? live.products[p.id] : undefined;
        if (!liveRecord) {
          if (liveUnavailableEntirely) {
            return { ...p, _live: null, _liveVerified: false, _matchedColors: [], _matchedSizes: [] };
          }
          return null; // منتج غير موجود في live.json رغم نجاح تحميله — لا نجزم بتوفره
        }
        if (!liveRecord.eligible) return null; // مخفي/نافد/غير مباع — لا يُعرض إطلاقاً

        const availableSizes = liveRecord.availableSizes || {};
        let matchedColors = Object.keys(availableSizes);
        if (requestedColors.length) {
          matchedColors = matchedColors.filter((c) => requestedColors.includes(c));
        }

        // لكل لون مطابق، صفِّ المقاسات ضمن النطاق التقريبي (إن وُجد نطاق؛ الفئات ذات ageGroup الصريح تتجاوز هذا الفحص)
        const matchedSizesByColor = {};
        let anySizeAvailable = false;
        for (const color of matchedColors) {
          let sizes = availableSizes[color] || [];
          if (sizeRange && !p.ageGroup) {
            sizes = sizes.filter((s) => s >= sizeRange[0] && s <= sizeRange[1]);
          }
          if (sizes.length) {
            matchedSizesByColor[color] = sizes;
            anySizeAvailable = true;
          }
        }

        if (!matchedColors.length || !anySizeAvailable) return null;

        return {
          ...p,
          _live: liveRecord,
          _liveVerified: true,
          _matchedColors: Object.keys(matchedSizesByColor),
          _matchedSizes: matchedSizesByColor,
        };
      })
      .filter(Boolean);
  }

  // ============================================================
  // 5) applyBudget — القسم 6: السعر المخفض الفعلي؛ الطقم = إجمالي المكوّنين
  // ============================================================
  function effectivePrice(liveRecord) {
    if (!liveRecord) return null;
    return liveRecord.hasDiscount ? liveRecord.salePrice : liveRecord.basePrice;
  }

  function applyBudget(candidates, answers, live) {
    if (answers.budget === undefined || answers.budget === null) return candidates;
    const track = resolveTrack(answers);
    return candidates
      .map((p) => {
        let price = effectivePrice(p._live);
        // مبلغ الطقم = إجمالي الثوب + السديري (§12.6) — فقط حين المسار الفعلي هو "طقم".
        // بعض أثواب الطقم (كالهيبة) لها أيضاً taqmRole لأنها تُستخدم كثوب مستقل أيضاً؛
        // لا نجمع سعر السديري إلا حين المستخدم فعلاً في مسار الطقم.
        if (track === 'طقم' && p.taqmRole === 'ثوب' && p.taqmPairIds && p.taqmPairIds.length) {
          // القسم 12.6: الميزانية = إجمالي المخفض للمكوّنين. نأخذ أرخص سديري متوفر متوافق كتقدير.
          const pairPrices = p.taqmPairIds
            .map((vid) => live && live.products && live.products[vid])
            .filter((v) => v && v.eligible)
            .map((v) => effectivePrice(v))
            .filter((n) => n !== null);
          if (pairPrices.length) {
            price = (price || 0) + Math.min(...pairPrices);
          }
        }
        const overBudget = price !== null && price > answers.budget;
        return { ...p, _price: price, _overBudget: overBudget, _overBudgetBy: overBudget ? price - answers.budget : 0 };
      })
      .filter((p) => p._price !== null);
  }

  // ============================================================
  // 6) rankResults — القسم 7.3: أقل تجاوزات للقابل للتجاوز (أسلوب/فخامة)، ثم ترتيب العائلة، ثم الأرخص
  // ============================================================
  function styleLuxuryMismatchScore(p, answers) {
    let mismatches = 0;
    const mapped = TRACK_UI_MAP[answers.styleChoice];
    if (mapped && mapped.styleHint && p.style && !p.style.includes(mapped.styleHint)) mismatches += 1;
    if (mapped && mapped.luxuryHint && p.luxury !== mapped.luxuryHint) mismatches += 1;
    return mismatches;
  }

  function rankResults(candidates, answers) {
    const withinBudget = candidates.filter((p) => !p._overBudget);
    const pool = withinBudget.length ? withinBudget : candidates; // §18 أقرب بديل عند عدم وجود مطابق كامل

    return pool
      .map((p) => ({ ...p, _mismatch: styleLuxuryMismatchScore(p, answers) }))
      .sort((a, b) => {
        if (a._overBudget !== b._overBudget) return a._overBudget ? 1 : -1;
        if (a._mismatch !== b._mismatch) return a._mismatch - b._mismatch;
        const rankA = a._familyRank === -1 ? Infinity : a._familyRank;
        const rankB = b._familyRank === -1 ? Infinity : b._familyRank;
        if (rankA !== rankB) return rankA - rankB;
        return (a._price || 0) - (b._price || 0);
      });
  }

  // ============================================================
  // 7) buildCards — القسم 8/20/22: أفضل / أبسط / أفخم
  // ============================================================
  function pickSkinToneColor(matchedColors, skinTone, skinToneColorWeights) {
    if (!skinTone || !skinToneColorWeights || !skinToneColorWeights[skinTone]) return matchedColors[0];
    const preferred = skinToneColorWeights[skinTone];
    // رتّب حسب أولوية التفضيل نفسها لا حسب ترتيب matchedColors العشوائي
    const found = preferred.find((c) => matchedColors.includes(c));
    return found || matchedColors[0];
  }

  function toCard(p, answers, skinToneColorWeights) {
    const color = pickSkinToneColor(p._matchedColors, answers.skinTone, skinToneColorWeights);
    const sizes = p._matchedSizes[color] || [];
    return {
      id: p.id,
      family: p.family,
      name: (p._live && p._live.name) || p.family,
      image: p._live ? p._live.image : null,
      url: p._live ? p._live.url : null,
      price: p._price,
      basePrice: p._live ? p._live.basePrice : null,
      salePrice: p._live ? p._live.salePrice : null,
      hasDiscount: p._live ? p._live.hasDiscount : false,
      color,
      availableSizes: sizes,
      overBudget: p._overBudget,
      overBudgetBy: p._overBudgetBy,
      mismatch: p._mismatch,
      mismatchReason: p._mismatch > 0 ? 'الأسلوب أو مستوى الفخامة المطلوب غير متوفر تماماً — أقرب بديل' : null,
    };
  }

  function buildCards(ranked, answers, options = {}) {
    if (!ranked.length) {
      return { empty: true, message: 'ما وجدنا خياراً يطابق كل الشروط. جرّبي تعديل شرط واحد (الأسلوب أو الفخامة) مع إبقاء العمر/المناسبة/اللون كما هي.' };
    }
    const skinToneColorWeights = options.skinToneColorWeights;

    if (answers.styleChoice === 'اختر_لي') {
      const best = ranked[0];
      const simpler = ranked.find((p) => p.id !== best.id && (p._price || 0) <= (best._price || 0)) || ranked[1];
      const fancier = ranked.find((p) => p.id !== best.id && p.id !== (simpler && simpler.id) && (p._price || 0) >= (best._price || 0)) ||
        ranked.find((p) => p.id !== best.id && p.id !== (simpler && simpler.id));

      const cards = [
        { role: 'best', label: 'الاختيار الأفضل', card: toCard(best, answers, skinToneColorWeights) },
      ];
      if (simpler) cards.unshift({ role: 'simpler', label: 'بديل أكثر بساطة', card: toCard(simpler, answers, skinToneColorWeights) });
      if (fancier) cards.push({ role: 'fancier', label: 'بديل أكثر فخامة', card: toCard(fancier, answers, skinToneColorWeights) });

      return { empty: false, mode: 'choose-for-me', cards };
    }

    return {
      empty: false,
      mode: 'direct',
      cards: ranked.map((p) => ({ role: 'result', label: null, card: toCard(p, answers, skinToneColorWeights) })),
    };
  }

  // ينفّذ السلسلة الكاملة (2-6) لمسار محدد بالضبط، ويرجّع القائمة المرتّبة الخام (بلا buildCards).
  function runPipelineForTrack(entries, answers, forcedTrack, rankings, live) {
    const trackedAnswers = forcedTrack ? { ...answers, _resolvedTrack: forcedTrack } : answers;
    let candidates = filterHardConstraints(entries, trackedAnswers);
    candidates = selectFamilies(candidates, trackedAnswers, rankings);
    candidates = checkLiveAvailability(candidates, live, trackedAnswers);
    candidates = applyBudget(candidates, trackedAnswers, live);
    return rankResults(candidates, trackedAnswers);
  }

  // ============================================================
  // التنسيق العام
  // ============================================================
  function recommend(rawAnswers, { catalog, rankings, live, skinToneColorWeights } = {}) {
    const collected = collectAnswers(rawAnswers);
    if (!collected.complete) {
      return { empty: true, incomplete: true, missing: collected.missing };
    }
    const answers = collected.answers;
    const entries = Object.entries(catalog).map(([id, meta]) => ({ id, ...meta }));

    const baseTrack = resolveTrack(answers);

    if (baseTrack !== 'اختر لي') {
      const ranked = runPipelineForTrack(entries, answers, null, rankings, live);
      return buildCards(ranked, answers, { skinToneColorWeights });
    }

    // مسار "اختر لي" (logic_prompt.md §14): جرّب أنواع الإطلالة بترتيب المناسبة، وتوقف
    // عند أول نوع يوفّر 3 مؤهلة؛ إن لم يبلغ أي نوع 3، استخدم أغنى نتيجة كأقرب بديل (§18).
    const occasionSet = normalizeOccasionSet(answers.occasionChoice);
    const primaryOccasion = Array.from(occasionSet)[0];
    const trackOrder = (rankings.chooseForMeTrackOrder && rankings.chooseForMeTrackOrder[primaryOccasion]) || ['ثوب'];

    let bestRanked = [];
    for (const candidateTrack of trackOrder) {
      const ranked = runPipelineForTrack(entries, answers, candidateTrack, rankings, live);
      if (ranked.length >= 3) { bestRanked = ranked; break; }
      if (ranked.length > bestRanked.length) bestRanked = ranked;
    }
    return buildCards(bestRanked, answers, { skinToneColorWeights });
  }

  return {
    recommend,
    collectAnswers,
    filterHardConstraints,
    selectFamilies,
    checkLiveAvailability,
    applyBudget,
    rankResults,
    buildCards,
    resolveTrack,
    normalizeOccasionSet,
    THOB_SIZE_RANGE_BY_AGE,
    VEST_TO_THOB_RANGE,
    OCCASION_UI_MAP,
    TRACK_UI_MAP,
  };
});

</script>
<script>
(function () {
  'use strict';

  // ============================================================
  // إعداد — استبدل هذا الرابط برابط خدمة Render الفعلي بعد النشر (build_spec.md §2/§5.1)
  // ============================================================
  const LIVE_JSON_URL = 'https://YOUR-RENDER-SERVICE.onrender.com/live.json';

  // ============================================================
  // أيقونات خطّية بسيطة (SVG مضمّن — لا مكتبات خارجية، logic_prompt.md §22.15)
  // ============================================================
  function icon(pathD, viewBox) {
    return '<svg width="22" height="22" viewBox="' + (viewBox || '0 0 24 24') +
      '" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
      pathD + '</svg>';
  }
  const ICONS = {
    baby: icon('<circle cx="12" cy="8" r="4"/><path d="M6 20c0-3 2.5-5 6-5s6 2 6 5"/>'),
    toddler: icon('<circle cx="12" cy="6" r="3"/><path d="M7 21v-4a5 5 0 0 1 10 0v4"/>'),
    kid: icon('<circle cx="12" cy="5" r="3"/><path d="M6 21l1-9h10l1 9"/>'),
    kid2: icon('<circle cx="12" cy="5" r="3"/><path d="M5 21l2-10h10l2 10"/>'),
    preteen: icon('<circle cx="12" cy="4.5" r="2.8"/><path d="M5 21l1.5-11h11L19 21"/>'),
    wedding: icon('<circle cx="8.5" cy="14.5" r="4.5"/><circle cx="15.5" cy="14.5" r="4.5"/><path d="M12 4v4"/>'),
    eid: icon('<path d="M17 12a5 5 0 1 1-6-4.9A6.5 6.5 0 1 0 17 12z"/>'),
    school: icon('<path d="M2 9l10-5 10 5-10 5-10-5z"/><path d="M6 11v5c0 1.5 3 3 6 3s6-1.5 6-3v-5"/>'),
    camera: icon('<rect x="3" y="7" width="18" height="13" rx="2"/><circle cx="12" cy="13.5" r="3.5"/><path d="M9 7l1.5-2h3L15 7"/>'),
    none: icon('<circle cx="12" cy="12" r="9"/><path d="M8 8l8 8"/>'),
    plain: icon('<path d="M9 3h6l1 4-1 14H9L8 7z"/>'),
    embroidered: icon('<path d="M9 3h6l1 4-1 14H9L8 7z"/><path d="M9.5 8h5M9.5 11h5M9.5 14h5"/>'),
    set: icon('<path d="M8 4h3l1 3-1 13H8L7 7z"/><path d="M14 5h4l1 3-1 9h-4z"/>'),
    luxury: icon('<path d="M12 2l1.8 4.6L18 8l-4.2 1.4L12 14l-1.8-4.6L6 8l4.2-1.4z"/><path d="M5 18l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8z"/>'),
    shuffle: icon('<path d="M3 6h4l7 12h4"/><path d="M3 16h4l2.5-4.3"/><path d="M17 6h4M17 16h4"/><path d="M18.5 4.5L21 6l-2.5 1.5M18.5 17.5L21 16l-2.5-1.5"/>'),
  };

  // ============================================================
  // بيانات الأسئلة
  // ============================================================
  const AGE_OPTIONS = [
    { value: 'مواليد', label: 'مواليد حتى سنة', icon: ICONS.baby },
    { value: '1-3', label: '1 - 3 سنوات', icon: ICONS.toddler },
    { value: '4-6', label: '4 - 6 سنوات', icon: ICONS.kid },
    { value: '7-9', label: '7 - 9 سنوات', icon: ICONS.kid2 },
    { value: '10-12', label: '10 - 12 سنة', icon: ICONS.preteen },
  ];
  const OCCASION_OPTIONS = [
    { value: 'زواج', label: 'زواج أو مناسبة فخمة', icon: ICONS.wedding },
    { value: 'عيد_زيارة', label: 'عيد أو زيارة', icon: ICONS.eid },
    { value: 'مدرسة_يومي', label: 'مدرسة أو يومي', icon: ICONS.school },
    { value: 'تصوير', label: 'تصوير', icon: ICONS.camera },
    { value: 'بدون', label: 'بدون مناسبة', icon: ICONS.none },
  ];
  const STYLE_OPTIONS = [
    { value: 'ثوب_سادة', label: 'ثوب سادة', icon: ICONS.plain },
    { value: 'ثوب_مطرز', label: 'ثوب مطرز', icon: ICONS.embroidered },
    { value: 'طقم', label: 'طقم ثوب مع سديري', icon: ICONS.set },
    { value: 'إطلالة_فخمة', label: 'إطلالة فخمة', icon: ICONS.luxury },
    { value: 'اختر_لي', label: 'اختاروا لي', icon: ICONS.shuffle },
  ];
  const SKIN_OPTIONS = [
    { value: 'فاتحة جداً', label: 'فاتحة جداً', swatch: '#f6dfc9' },
    { value: 'فاتحة', label: 'فاتحة', swatch: '#e8c19e' },
    { value: 'متوسطة', label: 'متوسطة', swatch: '#c98d5f' },
    { value: 'داكنة', label: 'داكنة', swatch: '#8a5a35' },
  ];
  // ترجيح ترتيب الألوان فقط داخل النتائج المؤهلة أصلاً — لا يُستبعد بها أي منتج إطلاقاً
  // (logic_prompt.md §7.1 و§19: "لا تستخدم لون البشرة كعامل استبعاد").
  const SKIN_COLOR_WEIGHTS = {
    'فاتحة جداً': ['رصاصي', 'سماوي', 'عنابي', 'أبيض', 'أوف وايت'],
    'فاتحة': ['أوف وايت', 'بيج', 'أخضر', 'أبيض'],
    'متوسطة': ['أبيض', 'أوف وايت', 'سماوي', 'بيج'],
    'داكنة': ['أبيض', 'أوف وايت', 'عنابي', 'أخضر'],
  };
  const COLOR_OPTIONS = [
    { value: 'أبيض', label: 'أبيض', swatch: '#ffffff' },
    { value: 'أوف وايت', label: 'أوف وايت', swatch: '#f1e7d6' },
    { value: 'سماوي', label: 'سماوي', swatch: '#8ec9e0' },
    { value: 'رصاصي', label: 'رصاصي', swatch: '#9aa0a6' },
    { value: 'بيج', label: 'بيج', swatch: '#e3c9a2' },
    { value: 'أخضر', label: 'أخضر', swatch: '#6f9c76' },
    { value: 'عنابي', label: 'عنابي', swatch: '#7a2733' },
  ];

  const STEPS = ['age', 'occasion', 'style', 'skin', 'colors', 'budget'];
  const STEP_TITLES = {
    age: 'كم عمر طفلك؟',
    occasion: 'الإطلالة لأي مناسبة؟',
    style: 'أي ستايل تفضّلين؟',
    skin: 'وش أقرب درجة لبشرة طفلك؟',
    colors: 'أي الألوان تفضّلين؟',
    budget: 'وش الميزانية التقريبية؟ (بالريال)',
  };

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  function mount(root) {
    const state = {
      screen: 'hero', // hero | question | results
      stepIndex: 0,
      answers: { colors: [] },
      live: null,
      liveError: false,
      liveLoading: true,
    };

    fetch(LIVE_JSON_URL)
      .then((r) => {
        if (!r.ok) throw new Error('bad status ' + r.status);
        return r.json();
      })
      .then((data) => {
        state.live = data;
        state.liveLoading = false;
        if (state.screen === 'results') render();
      })
      .catch(() => {
        state.liveError = true;
        state.liveLoading = false;
        if (state.screen === 'results') render();
      });

    function render() {
      if (state.screen === 'hero') return renderHero();
      if (state.screen === 'question') return renderQuestion();
      if (state.screen === 'results') return renderResults();
    }

    function renderHero() {
      root.innerHTML =
        '<div class="bw-hero">' +
        '<div class="bw-hero-content">' +
        '<p class="bw-eyebrow">✨ مساعد بُرجة للاختيار</p>' +
        '<h2 class="bw-title">محتارة وش تختارين لطفلك؟</h2>' +
        '<p class="bw-subtitle">جاوبي على 6 أسئلة سريعة، ونرشّح لك أنسب إطلالة متوفرة الآن بسعرها الصحيح.</p>' +
        '<button class="bw-cta" data-action="start">ابدئي الآن ←</button>' +
        '<div class="bw-trust-row">' +
        '<div class="bw-trust-item">اختيارات عصرية وفاخرة</div>' +
        '<div class="bw-trust-item">منتجات بجودة عالية</div>' +
        '<div class="bw-trust-item">تناسب كل المناسبات</div>' +
        '</div>' +
        '<div class="bw-how">' +
        '<h3>كيف تعمل الأداة؟</h3>' +
        '<div class="bw-how-step"><span class="bw-how-num">1</span> جاوبي على الأسئلة</div>' +
        '<div class="bw-how-step"><span class="bw-how-num">2</span> نحلل اختياراتك</div>' +
        '<div class="bw-how-step"><span class="bw-how-num">3</span> نرشّح لك الأنسب</div>' +
        '</div>' +
        '</div>' +
        '<div class="bw-hero-media">' +
        '<img src="https://cdn.salla.sa/ZqYBZ/ba28aece-5b3d-4a6d-88a8-ef127864b025-500x500-BUG3Ba1HXSlqSVhfertxBs2XT0kUivlaDJ4ZnblR.jpg" alt="طفل يرتدي ثوباً من برجة العربية" loading="lazy"/>' +
        '</div>' +
        '</div>';
      root.querySelector('[data-action="start"]').addEventListener('click', () => {
        state.screen = 'question';
        state.stepIndex = 0;
        render();
      });
    }

    function currentStep() { return STEPS[state.stepIndex]; }

    function isStepAnswered(step) {
      if (step === 'age') return !!state.answers.age;
      if (step === 'occasion') return !!state.answers.occasionChoice;
      if (step === 'style') return !!state.answers.styleChoice;
      if (step === 'skin') return !!state.answers.skinTone;
      if (step === 'colors') return true; // متعدد الاختيار، اختياري (يجوز "بدون تفضيل")
      if (step === 'budget') return state.answers.budget !== undefined && state.answers.budget !== null && state.answers.budget !== '';
      return false;
    }

    function renderProgressDots() {
      let html = '<div class="bw-progress">';
      STEPS.forEach((s, i) => {
        const cls = i === state.stepIndex ? 'is-active' : i < state.stepIndex ? 'is-done' : '';
        html += '<span class="bw-dot ' + cls + '"></span>';
      });
      html += '<span class="bw-progress-label">' + (state.stepIndex + 1) + ' من ' + STEPS.length + '</span></div>';
      return html;
    }

    function optionCardsHtml(options, selected, multi) {
      return '<div class="bw-options">' + options.map((o) => {
        const isSelected = multi ? selected.includes(o.value) : selected === o.value;
        return (
          '<button type="button" class="bw-option' + (isSelected ? ' is-selected' : '') + '" data-value="' + escapeHtml(o.value) + '">' +
          '<span class="bw-option-icon">' + o.icon + '</span>' +
          '<span>' + escapeHtml(o.label) + '</span>' +
          '</button>'
        );
      }).join('') + '</div>';
    }

    function colorGridHtml(selected) {
      let html = '<div class="bw-color-grid">';
      COLOR_OPTIONS.forEach((c) => {
        const isSelected = selected.includes(c.value);
        html +=
          '<button type="button" class="bw-color-chip' + (isSelected ? ' is-selected' : '') + '" data-value="' + escapeHtml(c.value) + '">' +
          '<span class="bw-color-swatch" style="background:' + c.swatch + '"></span>' +
          '<span>' + escapeHtml(c.label) + '</span>' +
          '</button>';
      });
      const noPrefSelected = selected.includes('بدون تفضيل');
      html +=
        '<button type="button" class="bw-color-chip' + (noPrefSelected ? ' is-selected' : '') + '" data-value="بدون تفضيل">' +
        '<span class="bw-color-swatch" style="background:#fff;border:1px dashed #999"></span>' +
        '<span>ما عندي تفضيل</span>' +
        '</button>';
      html += '</div>';
      return html;
    }

    function renderQuestion() {
      const step = currentStep();
      let bodyHtml = '';

      if (step === 'age') bodyHtml = optionCardsHtml(AGE_OPTIONS, state.answers.age, false);
      else if (step === 'occasion') bodyHtml = optionCardsHtml(OCCASION_OPTIONS, state.answers.occasionChoice, false);
      else if (step === 'style') bodyHtml = optionCardsHtml(STYLE_OPTIONS, state.answers.styleChoice, false);
      else if (step === 'skin') bodyHtml = optionCardsHtml(SKIN_OPTIONS.map((o) => ({ ...o, icon: '<span class="bw-color-swatch" style="background:' + o.swatch + ';display:inline-block;width:100%;height:100%;border-radius:50%"></span>' })), state.answers.skinTone, false);
      else if (step === 'colors') bodyHtml = colorGridHtml(state.answers.colors || []);
      else if (step === 'budget') {
        bodyHtml =
          '<input type="number" min="0" step="10" class="bw-budget-input" placeholder="مثال: 200" value="' +
          (state.answers.budget || '') + '" data-role="budget-input" inputmode="numeric" />';
      }

      root.innerHTML =
        '<div class="bw-question-screen">' +
        renderProgressDots() +
        '<h2 class="bw-question-title">' + STEP_TITLES[step] + '</h2>' +
        bodyHtml +
        '<div class="bw-nav-row">' +
        '<button class="bw-btn-secondary" data-action="back">رجوع</button>' +
        '<button class="bw-btn-primary" data-action="next"' + (isStepAnswered(step) ? '' : ' disabled') + '>' +
        (state.stepIndex === STEPS.length - 1 ? 'النتائج' : 'التالي') +
        '</button>' +
        '</div>' +
        '</div>';

      if (step !== 'budget') {
        root.querySelectorAll('.bw-option, .bw-color-chip').forEach((btn) => {
          btn.addEventListener('click', () => {
            const value = btn.getAttribute('data-value');
            if (step === 'age') state.answers.age = value;
            else if (step === 'occasion') state.answers.occasionChoice = value;
            else if (step === 'style') state.answers.styleChoice = value;
            else if (step === 'skin') state.answers.skinTone = value;
            else if (step === 'colors') {
              const list = state.answers.colors || [];
              if (value === 'بدون تفضيل') {
                state.answers.colors = list.includes('بدون تفضيل') ? [] : ['بدون تفضيل'];
              } else {
                let next = list.filter((v) => v !== 'بدون تفضيل');
                next = next.includes(value) ? next.filter((v) => v !== value) : next.concat(value);
                state.answers.colors = next;
              }
            }
            render();
          });
        });
      } else {
        const input = root.querySelector('[data-role="budget-input"]');
        input.addEventListener('input', () => {
          const n = parseFloat(input.value);
          state.answers.budget = input.value === '' ? null : (isNaN(n) ? null : n);
          root.querySelector('[data-action="next"]').disabled = !isStepAnswered('budget');
        });
      }

      root.querySelector('[data-action="back"]').addEventListener('click', () => {
        if (state.stepIndex === 0) { state.screen = 'hero'; render(); return; }
        state.stepIndex -= 1;
        render();
      });
      root.querySelector('[data-action="next"]').addEventListener('click', () => {
        if (!isStepAnswered(step)) return;
        if (state.stepIndex === STEPS.length - 1) {
          state.screen = 'results';
          render();
        } else {
          state.stepIndex += 1;
          render();
        }
      });
    }

    function priceBlockHtml(card) {
      if (card.hasDiscount) {
        return (
          '<div class="bw-card-price-row">' +
          '<span class="bw-price-now">' + card.price.toFixed(2) + ' ر.س</span>' +
          '<span class="bw-price-was">' + card.basePrice.toFixed(2) + ' ر.س</span>' +
          '</div>'
        );
      }
      return '<div class="bw-card-price-row"><span class="bw-price-now">' + (card.price != null ? card.price.toFixed(2) + ' ر.س' : '—') + '</span></div>';
    }

    function cardHtml(entry) {
      const card = entry.card;
      const isBest = entry.role === 'best';
      const roleLabel = entry.label || '';
      let alertHtml = '';
      if (card.overBudget) {
        alertHtml += '<div class="bw-card-alert">أعلى من الميزانية بمقدار ' + card.overBudgetBy.toFixed(2) + ' ر.س</div>';
      }
      if (card.mismatchReason) {
        alertHtml += '<div class="bw-card-alert">' + card.mismatchReason + '</div>';
      }
      const imgSrc = card.image || '';
      const imgHtml = imgSrc
        ? '<img src="' + escapeHtml(imgSrc) + '" alt="' + escapeHtml(card.name) + '" loading="lazy"/>'
        : '<div class="bw-card-alert">لا تتوفر صورة — ' + escapeHtml(card.name) + '</div>';

      return (
        '<div class="bw-card' + (isBest ? ' is-best' : '') + '">' +
        (isBest ? '<div class="bw-card-badge">الاختيار الأفضل</div>' : '') +
        (roleLabel && !isBest ? '<div class="bw-card-role">' + escapeHtml(roleLabel) + '</div>' : '') +
        imgHtml +
        '<div class="bw-card-name">' + escapeHtml(card.name) + '</div>' +
        priceBlockHtml(card) +
        (card.availableSizes && card.availableSizes.length
          ? '<div class="bw-size-note">المقاسات المتاحة: ' + card.availableSizes.join('، ') + '</div>'
          : '') +
        alertHtml +
        (card.url
          ? '<a class="bw-card-cta" href="' + escapeHtml(card.url) + '" target="_blank" rel="noopener">عرض المنتج</a>'
          : '<span class="bw-card-alert">رابط المنتج غير متاح حالياً</span>') +
        (isBest && card.url ? '<a class="bw-card-cta-extra" href="' + escapeHtml(card.url) + '" target="_blank" rel="noopener">أضف للسلة</a>' : '') +
        '</div>'
      );
    }

    function renderResults() {
      if (state.liveLoading) {
        root.innerHTML =
          '<div class="bw-state-box">' +
          '<div class="bw-skeleton" style="width:60%;margin:0 auto"></div>' +
          '<div class="bw-skeleton" style="width:40%;margin:8px auto"></div>' +
          'جاري التحقق من المنتجات المتاحة…' +
          '</div>';
        return;
      }
      if (state.liveError || !state.live) {
        root.innerHTML =
          '<div class="bw-state-box">' +
          '<p>تعذّر التحقق المباشر من التوفر والأسعار الآن.</p>' +
          '<p>التوفر غير مؤكد حالياً — الرجاء المحاولة مرة أخرى بعد قليل.</p>' +
          '<div class="bw-restart-row"><button class="bw-restart-btn" data-action="restart">↻ حاولي مرة أخرى</button></div>' +
          '</div>';
        root.querySelector('[data-action="restart"]').addEventListener('click', () => {
          state.screen = 'hero';
          state.stepIndex = 0;
          render();
        });
        return;
      }

      const result = window.DecisionEngine.recommend(state.answers, {
        catalog: window.BURJAH_PRODUCTS,
        rankings: window.BURJAH_RANKINGS,
        live: state.live,
        skinToneColorWeights: SKIN_COLOR_WEIGHTS,
      });

      if (result.empty) {
        root.innerHTML =
          '<div class="bw-state-box">' +
          '<p>' + escapeHtml(result.message || 'ما وجدنا خياراً يطابق كل الشروط.') + '</p>' +
          '<div class="bw-restart-row"><button class="bw-restart-btn" data-action="restart">↻ غيّري إجاباتك</button></div>' +
          '</div>';
        root.querySelector('[data-action="restart"]').addEventListener('click', () => {
          state.screen = 'question';
          state.stepIndex = 0;
          render();
        });
        return;
      }

      const suitableColors = {};
      result.cards.forEach((c) => {
        if (c.card.color) suitableColors[c.card.color] = COLOR_OPTIONS.find((o) => o.value === c.card.color) || { swatch: '#ccc' };
      });

      root.innerHTML =
        '<div>' +
        '<h2 class="bw-results-title">✨ اختيارنا الأنسب لطفلك</h2>' +
        '<p class="bw-summary-line">العمر: ' + escapeHtml(state.answers.age) +
        ' · المناسبة: ' + escapeHtml(state.answers.occasionChoice) +
        ' · الميزانية: ' + escapeHtml(state.answers.budget) + ' ر.س</p>' +
        '<div class="bw-cards-row">' + result.cards.map(cardHtml).join('') + '</div>' +
        (Object.keys(suitableColors).length
          ? '<div class="bw-suitable-colors"><h4>الألوان الأنسب لطفلك</h4><div class="bw-suitable-colors-row">' +
            Object.entries(suitableColors).map(([name, o]) =>
              '<span class="bw-suitable-color"><span style="background:' + o.swatch + '"></span>' + escapeHtml(name) + '</span>'
            ).join('') + '</div></div>'
          : '') +
        '<p class="bw-availability-note">المقاسات تقريبية بناءً على العمر والمتوفر، والمرجع النهائي جدول المقاسات قبل إتمام الطلب.</p>' +
        '<div class="bw-restart-row"><button class="bw-restart-btn" data-action="restart">↻ غيّري إجاباتك</button></div>' +
        '</div>';

      root.querySelector('[data-action="restart"]').addEventListener('click', () => {
        state.screen = 'question';
        state.stepIndex = 0;
        render();
      });
    }

    render();
  }

  function init() {
    document.querySelectorAll('[data-burjah-widget]').forEach(mount);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
